{{- if .Values.dnsclass.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.name" . }}-probe-service
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  selector:
    control-plane: controller-manager
  {{- include "chart.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: probe
{{- end }}
