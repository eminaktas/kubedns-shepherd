  namespace: kubedns-shepherd-system
spec:
  dnsNames:
  - kubedns-shepherd-controller-manager-metrics-service.kubedns-shepherd-system.svc
  - kubedns-shepherd-controller-manager-metrics-service.kubedns-shepherd-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: kubedns-shepherd-selfsigned-issuer
  secretName: metrics-server-cert
