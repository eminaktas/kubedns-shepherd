# To integrate with Prometheus.
{{- if .Values.prometheus.enable }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{- with .Values.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "chart.labels" . | nindent 4 }}
    control-plane: controller-manager
  {{- with .Values.prometheus.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ include "chart.name" . }}-metrics-monitor
  namespace: {{ .Values.prometheus.serviceMonitor.namespace | default .Release.Namespace }}
spec:
  endpoints:
    - path: /metrics
      port: https
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        {{- if .Values.certmanager.enable }}
        serverName: {{ include "chart.name" . }}-metrics-service.{{ .Release.Namespace }}.svc
        # Apply secure TLS configuration with cert-manager
        insecureSkipVerify: false
        ca:
          secret:
            name: {{ include "chart.name" . }}-metrics-server-cert
            key: ca.crt
        cert:
          secret:
            name: {{ include "chart.name" . }}-metrics-server-cert
            key: tls.crt
        keySecret:
          name: {{ include "chart.name" . }}-metrics-server-cert
          key: tls.key
        {{- else }}
        # Development/Test mode (insecure configuration)
        insecureSkipVerify: true
        {{- end }}
      interval: {{ .Values.prometheus.serviceMonitor.interval | quote }}
      {{- with .Values.prometheus.serviceMonitor.relabelings }}
      relabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.prometheus.serviceMonitor.metricRelabelings }}
      metricRelabelings:
      {{- toYaml . | nindent 6 }}
      {{- end }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "chart.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
{{- end }}
